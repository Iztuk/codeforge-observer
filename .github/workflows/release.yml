name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: cf-observer-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: cf-observer-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: cf-observer-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: cf-observer-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: cf-observer-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cf-observer-linux-amd64/cf-observer-linux-amd64
            cf-observer-linux-arm64/cf-observer-linux-arm64
            cf-observer-darwin-amd64/cf-observer-darwin-amd64
            cf-observer-darwin-arm64/cf-observer-darwin-arm64
            cf-observer-windows-amd64/cf-observer-windows-amd64.exe

